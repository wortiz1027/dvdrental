spring:
  application:
    name: dvd-rental-high-scale
  output:
    ansi:
      enabled: ALWAYS
  threads:
    virtual:
      enabled: true
  flyway:
    baseline-on-migrate: true
    baseline-version: "1"
  datasource:
    url: jdbc:postgresql://${DB_HOSTNAME}:5432/${DB_NAME}?currentSchema=${DB_SCHEMA}&sslmode=disable
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Explicación en la sección de advertencias técnicas
      maximum-pool-size: 50
      minimum-idle: 50
      idle-timeout: 30000
      connection-timeout: 2000
      max-lifetime: 1800000
      pool-name: HikariVirtualThreadsPool
  jpa:
    open-in-view: false # Evita mantener conexiones abiertas bloqueando hilos
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
management:
  otlp:
    metrics:
      export:
        enabled: true
        url: http://otel-collector:4318/v1/metrics # Envía los datos al contenedor

