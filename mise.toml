[tools]
java = "oracle-25.0.3"
gradle = "9.6.1"
snyk = "1.1306.0"
gitleaks = "8.30.1"
trufflehog = "3.95.9"
miniserve = "0.35.0"
taplo = "0.10.0"
trivy = "0.72.0"

[tool_alias.java.versions]
oracle = "oracle-25.0.3"
temurin = "temurin-25.0.3+9.0.LTS"

[tool_alias.gradle.versions]
latest = "9.6.1"

[env]
JAVA_HOME = "/home/vscode/.local/share/mise/installs/java/latest"
GRADLE_HOME = "/home/vscode/.local/share/mise/installs/gradle/latest"
_.path = [
    "/home/vscode/.local/share/mise/installs/java/latest/bin:/home/vscode/.local/share/mise/installs/gradle/latest/bin",
]

[tasks]
# Añades el escaneo de seguridad a tus tareas globales
"security:scan-snyk" = { run = "snyk test" }

# 1. 🚀 AUTOMÁTICA: Detecta el último tag SemVer e incrementa automáticamente el Patch (ej: v1.0.0 -> v1.0.1)
"git:tag-patch" = { run = """
# Obtener el último tag del repositorio o inicializar en v1.0.0 si está vacío
LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")

# Extraer los componentes Mayor, Menor y Parche limpiando la 'v'
VERSION_CLEAN=$(echo "$LAST_TAG" | sed 's/^v//')
MAJOR=$(echo "$VERSION_CLEAN" | cut -d'.' -f1)
MINOR=$(echo "$VERSION_CLEAN" | cut -d'.' -f2)
PATCH=$(echo "$VERSION_CLEAN" | cut -d'.' -f3)

# Incrementar matemáticamente el componente Patch
NEW_PATCH=$((PATCH + 1))
NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"

echo "📍 Última versión detectada: $LAST_TAG"
echo "🆕 Creando tag anotado automático: $NEW_TAG"

git tag -a "$NEW_TAG" -m "Automated architecture baseline release $NEW_TAG"
git push origin "$NEW_TAG" 2>/dev/null || echo "⚠️ Advertencia: No se pudo hacer push al remoto, tag creado localmente."
""" }

# 2. 🎛️ MANUAL/CI-CD: Te permite inyectar una versión y mensaje personalizado por terminal
"git:tag-custom" = { run = """
# Validar que se pasaron las variables obligatorias
if [ -z "$TAG_VERSION" ]; then
  echo "❌ Error: Debes suministrar la variable TAG_VERSION. Ejemplo: TAG_VERSION=1.1.0 mise run git:tag-custom"
  exit 1
fi

MSG="${TAG_MSG:-Manual architecture baseline release v$TAG_VERSION}"
VERSION_FORMATTED="v$(echo "$TAG_VERSION" | sed 's/^v//')"

echo "🔖 Creando tag personalizado: $VERSION_FORMATTED"
git tag -a "$VERSION_FORMATTED" -m "$MSG"
git push origin "$VERSION_FORMATTED" 2>/dev/null || echo "⚠️ Tag creado localmente."
""" }


# 🧱 Compilación con etiquetado dinámico basado en SemVer
"app:build" = { run = """
# 1. Obtener la versión más cercana de Git o fallback inicial
GIT_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.1.0-snapshot")

# 2. Limpiar el prefijo 'v' para cumplir estrictamente con SemVer
SEMVER_VERSION=$(echo "$GIT_VERSION" | sed 's/^v//')

echo "🏷️ Compilando y etiquetando imagen para versión: $SEMVER_VERSION"

# 3. Construir la imagen asignando el tag de la versión real y el tag latest en simultáneo
docker build \
  --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
  --build-arg BUILD_VERSION="$SEMVER_VERSION" \
  -t dvd-rental-extreme:"$SEMVER_VERSION" \
  -t dvd-rental-extreme:latest .
""" }

# 🛡️ Actualizamos el escáner de seguridad para que analice la versión dinámica
"security:scan-image" = { run = """
GIT_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.1.0-snapshot")
SEMVER_VERSION=$(echo "$GIT_VERSION" | sed 's/^v//')

trivy image --severity CRITICAL,HIGH --exit-code 1 dvd-rental-extreme:"$SEMVER_VERSION"
""" }

"git:init" = { run = "mise generate git-pre-commit --write --task=lint" }

"lint" = { depends = [
    "lint:whitespace",
    "lint:eof",
    "lint:json",
    "lint:yaml",
    "lint:toml",
    "lint:xml",
    "lint:private-keys",
    "lint:checkstyle",
    "lint:secrets",
    "lint:dependencies",
] }

"lint:whitespace" = { run = "find src/ .devcontainer/ . -maxdepth 1 \\( -name '*.toml' -o -name '*.xml' -o -name '*.json' \\) -type f -exec sed -i 's/[[:space:]]*$//' {} +" }
"lint:eof" = { run = "find src/ .devcontainer/ . -maxdepth 1 \\( -name '*.toml' -o -name '*.xml' -o -name '*.json' \\) -type f -exec awk 'NF {last=$0} END {if (last !~ /\\n$/) print \"\"}' {} +" }
"lint:json" = { run = "find . -name '*.json' ! -path '*/.*' -exec jq --indent 2 '.' {} \\;" }
"lint:yaml" = { run = "find . -name '*.yaml' -o -name '*.yml' -exec grep -q '^' {} \\;" }
"lint:toml" = { run = "taplo fmt --check" }
"lint:xml" = { run = "java -jar /workspace/.cache/google-style-java.jar --help > /dev/null" }
"lint:private-keys" = { run = "! grep -qE -e '---BEGIN (RSA|OPENSSH|PRIVATE) KEY---' $(find . -type f ! -path '*/.*')" }
"lint:checkstyle" = { run = "./gradlew checkstyleMain" }
"lint:dependencies" = { run = "./gradlew dependencyCheckAnalyze --no-daemon" }
"lint:secrets" = { run = "gitleaks protect --staged --verbose" }
"lint:trufflehog" = { run = "trufflehog filesystem --only-verified --staged ." }
"lint:commit-message" = { run = "grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\\([a-z0-9_-]+\\))?!?: .+' .git/COMMIT_EDITMSG" }
"docs:serve" = { run = "miniserve ./docs --index index.html -p 3000" }

[hooks]
postinstall = ".devcontainer/dev/scripts/sync-env.sh"
[[watch_files]]
patterns = ["mise.toml"]
run = ".devcontainer/dev/scripts/sync-env.sh"
